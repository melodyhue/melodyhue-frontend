services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: "${container_name:-melodyhue-frontend}"
    restart: unless-stopped
    environment:
      PORT: "3000"
      API_BASE_URL: "${API_BASE_URL:-https://api.melodyhue.com}"
      PROXY_FORWARD: "${PROXY_FORWARD:-fetch}"
      DEBUG_PROXY: "${DEBUG_PROXY:-false}"
    networks:
      - dokploy-network

networks:
  dokploy-network:
    external: true
